<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Baby Tracker">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  <title>Baby Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>Baby Tracker</h1>
    </header>

    <nav class="tab-bar">
      <button class="tab active" data-tab="actions">Log</button>
      <button class="tab" data-tab="history">History</button>
      <button class="tab" data-tab="stats">Stats</button>
    </nav>

    <main>
      <!-- Actions View -->
      <section id="actions-view" class="view active">
        <div class="action-grid">
          <button class="action-btn" data-type="diaper">
            <span class="action-icon">👶</span>
            <span class="action-label">Diaper Change</span>
          </button>
          <button class="action-btn" data-type="urine">
            <span class="action-icon">💧</span>
            <span class="action-label">Urine</span>
          </button>
          <button class="action-btn" data-type="motion">
            <span class="action-icon">💩</span>
            <span class="action-label">Motion</span>
          </button>
          <button class="action-btn" data-type="feeding">
            <span class="action-icon">🍼</span>
            <span class="action-label">Feeding</span>
          </button>
        </div>


      </section>

      <!-- History View -->
      <section id="history-view" class="view">
        <div class="filter-bar">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="diaper">👶</button>
          <button class="filter-btn" data-filter="urine">💧</button>
          <button class="filter-btn" data-filter="motion">💩</button>
          <button class="filter-btn" data-filter="feeding">🍼</button>
        </div>
        <div id="history-list" class="history-list">
          <p class="empty-state">No events logged yet</p>
        </div>
        <button id="clear-history" class="clear-btn hidden">Clear All</button>
      </section>

      <!-- Stats View -->
      <section id="stats-view" class="view">
        <div id="stats-content" class="stats-content">
          <p class="empty-state">No events logged yet</p>
        </div>
      </section>
    </main>

    <!-- Toast notification -->
    <div id="toast" class="toast hidden"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
